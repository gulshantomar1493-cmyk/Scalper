# MarketScalper configuration — COMMITTED base layer (layer 1 of 3).
#
# Loading order (fixed): config.example.yaml -> config.yaml (git-ignored) -> env vars.
# Copy this file to backend/config.yaml for local overrides.
# NO SECRETS IN THIS FILE, EVER — dsn stays empty here; set it in
# config.yaml (git-ignored) or via MARKETSCALPER_DB_DSN.

app:
  log_level: INFO        # env: MARKETSCALPER_LOG_LEVEL
  log_dir: logs          # env: MARKETSCALPER_LOG_DIR

# v1 scope (frozen): BTC + ETH only, 1m primary / 5m context.
symbols:                 # env: MARKETSCALPER_SYMBOLS (comma-separated)
  - BTCUSDT
  - ETHUSDT

timeframes:              # env: MARKETSCALPER_TIMEFRAMES (comma-separated)
  - 1m
  - 5m

database:
  dsn: ""                # SECRET — env: MARKETSCALPER_DB_DSN (PostgreSQL 16)

# Decision D9 (P1.3) regime + momentum-shift constants. Defaults EQUAL the
# frozen §4.2 literals, so leaving this untouched is byte-identical to the
# engines' built-in defaults. They exist for the P5.3 calibration sweep and
# are explicitly UNCALIBRATED — do not tune outside a P5 campaign.
regime:
  compression_ratio: 0.6   # env: MARKETSCALPER_REGIME_COMPRESSION_RATIO   (coil: atr_1m < r * atr_5m)
  expansion_ratio: 1.5     # env: MARKETSCALPER_REGIME_EXPANSION_RATIO     (expansion: atr_1m > r * median)
  median_window_bars: 240  # env: MARKETSCALPER_REGIME_MEDIAN_WINDOW_BARS  (rolling ATR-median window)

momentum:
  shift_accel_atr_ratio: 0.1  # env: MARKETSCALPER_MOMENTUM_SHIFT_ACCEL_ATR_RATIO  (|accel| > r * ATR)
