<!DOCTYPE html>
<!-- MarketScalper — frontend shell (roadmap P0.22; Architecture §9).
     Standalone static files: no build system, no framework, no bundler.
     Open as: index.html?api=127.0.0.1:8000&token=YOUR_TOKEN
     (?api defaults to the serving host; token can also be entered at load.) -->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MarketScalper</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- TradingView Lightweight Charts v5 — pinned version (Apache-2.0, §2 locked) -->
  <script src="https://unpkg.com/lightweight-charts@5.0.0/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      MarketScalper
      <span class="brand-sub">deterministic analysis &middot; decision support &middot; no execution</span>
    </div>
    <div class="switcher mono">
      <button id="sym-BTCUSDT" type="button">BTCUSDT</button>
      <button id="sym-ETHUSDT" type="button">ETHUSDT</button>
    </div>
    <div class="conn">
      <button id="dash-open" type="button" class="dash-open-btn">Dashboard</button>
      <span id="trend-state" class="mono trend">trend: —</span>
      <span id="conn-dot" class="dot"></span>
      <span id="conn-text" class="mono">CONNECTING</span>
    </div>
  </header>

  <!-- Analytics dashboard + journal tab (P4.12; §11). Overlay, hidden
       until the header button opens it; app.js fetches, dashboard.js draws. -->
  <div id="dashboard">
    <div class="dash-panel">
      <div class="dash-bar">
        <button id="dash-tab-analytics" type="button" class="dash-tab active">Analytics</button>
        <button id="dash-tab-journal" type="button" class="dash-tab">Journal</button>
        <button id="dash-close" type="button" class="dash-close">✕</button>
      </div>
      <div class="dash-body">
        <div id="dash-analytics"></div>
        <div id="dash-journal" style="display:none"></div>
      </div>
    </div>
  </div>

  <div class="replay-bar mono">
    <span class="strip-label-inline">REPLAY</span>
    <input id="replay-from" type="datetime-local" />
    <input id="replay-to" type="datetime-local" />
    <select id="replay-speed">
      <option value="1">×1</option>
      <option value="10">×10</option>
      <option value="60" selected>×60</option>
      <option value="max">max</option>
    </select>
    <button id="replay-start" type="button">Start</button>
    <button id="replay-stop" type="button">Stop</button>
    <span class="strip-label-inline audit-label">AUDIT</span>
    <button id="audit-pick" type="button">Random line</button>
    <button id="audit-pick-sweep" type="button">Random Sweep</button>
    <button id="audit-pick-ob" type="button">Random OB</button>
    <button id="audit-accept" type="button" disabled>Accept</button>
    <button id="audit-reject" type="button" disabled>Reject</button>
    <span id="audit-tally">TL 0/0 (0)  SWP 0/0 (0)  OB 0/0 (0)</span>
  </div>

  <div id="workspace">
    <main id="chart-wrap">
      <div id="chart"></div>
      <div id="strip-wrap">
        <span class="strip-label mono">5m context</span>
        <div id="strip"></div>
      </div>
    </main>

    <!-- Quality panel (P3.19; §9 right rail) — pure render of the payload's
         qualification / signals / recommendations. No engine math here. -->
    <aside id="quality-panel" class="empty">
      <section class="panel-section gauge-section">
        <div class="gauge-wrap">
          <svg class="gauge-svg" viewBox="0 0 120 120" aria-hidden="true">
            <circle class="gauge-track" cx="60" cy="60" r="52" />
            <circle id="gauge-arc" class="gauge-arc" cx="60" cy="60" r="52" />
          </svg>
          <div class="gauge-center">
            <span id="gauge-score" class="mono">—</span>
            <span class="gauge-scale">/100</span>
          </div>
        </div>
        <div id="gauge-verdict" class="gauge-verdict">—</div>
        <div class="gauge-meta">
          <span id="gauge-integrity" class="gauge-integrity">—</span>
          <span id="gauge-agreement" class="mono"></span>
        </div>
      </section>

      <section class="panel-section">
        <h2 class="panel-title">Hard gates</h2>
        <div id="panel-gates"></div>
      </section>

      <section class="panel-section">
        <h2 class="panel-title">Signal agreement</h2>
        <div id="panel-components"></div>
      </section>

      <section class="panel-section">
        <h2 class="panel-title">Trade plan</h2>
        <div id="panel-plan"></div>
      </section>

      <section class="panel-section">
        <h2 class="panel-title">Reason trace</h2>
        <div id="panel-reasons"></div>
      </section>
    </aside>
  </div>

  <footer class="statusbar mono">
    <span id="ws-target"></span>
    <span id="last-event">last event: —</span>
  </footer>

  <script src="overlays.js"></script>
  <script src="panel.js"></script>
  <script src="dashboard.js"></script>
  <script src="app.js"></script>
</body>
</html>
