# MarketScalper reverse proxy (production, Phase C).
#
# One TLS front door for a single-user, multi-device workstation:
#   * serves the static frontend (frontend/) at /
#   * proxies the API + WebSocket to the backend on 127.0.0.1:8000
#   * terminates HTTPS (certs managed by certbot / Let's Encrypt)
#
# The backend binds 127.0.0.1 only (MARKETSCALPER_API_HOST=127.0.0.1) — it is
# NEVER exposed directly; nginx is the only public listener. Same-origin means
# the frontend needs no ?api= param and the scheme-aware client uses wss://.
#
# Install:
#   sudo cp deployment/nginx.conf /etc/nginx/sites-available/marketscalper
#   sudo ln -s /etc/nginx/sites-available/marketscalper /etc/nginx/sites-enabled/
#   # edit server_name below, then:
#   sudo certbot --nginx -d YOUR_DOMAIN        # provisions + wires the certs
#   sudo nginx -t && sudo systemctl reload nginx
#
# Replace YOUR_DOMAIN with the real host (a hosting/domain choice — never
# committed). For a pure IP deployment without a domain, drop the TLS server
# block and serve the "listen 80" block directly (HTTP only — acceptable on a
# private/VPN IP; the D3 token is still required for every data route).

upstream marketscalper_backend {
    server 127.0.0.1:8000;
    keepalive 16;
}

# Access log WITHOUT the query string, so the ?token=... on the WS handshake
# never lands in the logs (the one place the static token can leak).
log_format ms_noqs '$remote_addr - [$time_local] '
                   '"$request_method $uri $server_protocol" $status '
                   '$body_bytes_sent "$http_user_agent"';

# ---- HTTP: redirect everything to HTTPS (certbot also manages this) --------
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    # Let's Encrypt HTTP-01 challenge is served from here during renewal.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ---- HTTPS: the real server ------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    # certbot fills these in (paths shown for reference):
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:5m;
    ssl_session_timeout 1h;

    access_log /var/log/nginx/marketscalper.access.log ms_noqs;
    error_log  /var/log/nginx/marketscalper.error.log;

    # PATCH /journal bodies are tiny; cap uploads hard.
    client_max_body_size 64k;

    # ---- security headers ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;
    # LWC is loaded from unpkg; inline head script sets the theme. Relax only
    # if you vendor the chart lib locally (see docs/DEPLOYMENT.md).
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' https://unpkg.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'self'" always;

    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 512;

    # ---- API + WebSocket -> backend ----
    # WebSocket handshake needs the Upgrade/Connection headers + a long read
    # timeout (the /ws socket is idle between candles).
    location = /ws {
        proxy_pass http://marketscalper_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # All REST data + control routes. Everything else is a static file.
    location ~ ^/(health|candles|api|journal|analytics|campaign|replay)(/|$) {
        proxy_pass http://marketscalper_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ---- static frontend ----
    root /opt/marketscalper/frontend;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
